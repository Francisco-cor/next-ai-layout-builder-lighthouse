name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          # Stub env vars so the build succeeds without real Sanity credentials.
          # Lighthouse tests static HTML output — no live Sanity queries in CI.
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID || 'ci-stub' }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET || 'production' }}
          NEXT_PUBLIC_SANITY_GRAPHQL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_SANITY_GRAPHQL_ENDPOINT || 'https://ci-stub.api.sanity.io/v2024-01-01/graphql/production/default' }}
          NEXT_PUBLIC_SANITY_API_VERSION: '2024-01-01'
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN || '' }}
          NEXT_PUBLIC_STUDIO_AUTH_SECRET: ${{ secrets.NEXT_PUBLIC_STUDIO_AUTH_SECRET || 'ci-stub-token' }}
          STUDIO_AUTH_SECRET: ${{ secrets.STUDIO_AUTH_SECRET || 'ci-stub-token' }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET || 'ci-stub-secret' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
